version: v1
plugins:
  - plugin: go
    out: server/proto
    opt: 
    - paths=source_relative
    - Mgreeter.proto=github.com/highonsemicolon/experiments/grpc/proto;proto

  - plugin: go-grpc
    out: server/proto
    opt: 
    - paths=source_relative
    - Mgreeter.proto=github.com/highonsemicolon/experiments/grpc/proto;proto

  - plugin: buf.build/community/timostamm-protobuf-ts
    out: client/src/proto
