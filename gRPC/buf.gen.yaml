version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: server/proto
    opt:
      - paths=source_relative
      - Mgreeter.proto=github.com/highonsemicolon/experiments/grpc/proto;proto
  
  - remote: buf.build/grpc/go
    out: server/proto
    opt:
      - paths=source_relative
      - Mgreeter.proto=github.com/highonsemicolon/experiments/grpc/proto;proto
  
  - remote: buf.build/community/timostamm-protobuf-ts
    out: client/src/proto
