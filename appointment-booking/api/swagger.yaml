openapi: "3.0.0"
info:
  title: Appointment Booking API
  description: Connects coaches with users for 30-minute appointment slots
  version: "1.0.0"

servers:
  - url: /api/v1

paths:
  /coaches/register:
    post:
      summary: Register current user as a coach
      operationId: RegisterCoach
      tags: [Coach]
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCoachRequest'
      responses:
        '201':
          description: Coach registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /coaches/availability:
    post:
      summary: Set coach weekly availability
      operationId: SetCoachAvailability
      tags: [Coach]
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAvailabilityRequest'
      responses:
        '201':
          description: Availability set successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /coaches/{coachId}/availability:
    get:
      summary: Get coach availability settings
      operationId: GetCoachAvailability
      tags: [Coach]
      parameters:
        - name: coachId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of availability windows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailabilityResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/slots:
    get:
      summary: Get available 30-minute slots for a coach on a specific date
      operationId: GetAvailableSlots
      tags: [User]
      parameters:
        - name: coach_id
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: timezone
          in: query
          required: false
          schema:
            type: string
            example: "Asia/Kolkata"
      responses:
        '200':
          description: List of available slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableSlotsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/bookings:
    post:
      summary: Book a 30-minute appointment slot
      operationId: CreateBooking
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      summary: Get all bookings for current user
      operationId: GetUserBookings
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: timezone
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/bookings/{bookingId}:
    delete:
      summary: Cancel a booking
      operationId: CancelBooking
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Booking cancelled successfully
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    UserIdHeader:
      name: User-ID
      in: header
      required: true
      schema:
        type: string
      description: Injected by API Gateway after authentication

  schemas:

    RegisterCoachRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email

    CoachResponse:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time

    SetAvailabilityRequest:
      type: object
      required: [day_of_week, start_time, end_time]
      properties:
        day_of_week:
          type: string
          enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        start_time:
          type: string
          pattern: '^\d{2}:\d{2}$'
        end_time:
          type: string
          pattern: '^\d{2}:\d{2}$'
        timezone:
          type: string
          example: "Asia/Kolkata"

    AvailabilityResponse:
      type: object
      properties:
        day_of_week:
          type: string
        start_time:
          type: string
        end_time:
          type: string
        timezone:
          type: string

    CreateBookingRequest:
      type: object
      required: [coach_id, slot_time]
      properties:
        coach_id:
          type: string
        slot_time:
          type: string
          format: date-time

    BookingResponse:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: string
        coach_id:
          type: string
        coach_name:
          type: string
        slot_time:
          type: string
          format: date-time
        status:
          type: string
          enum: [booked, cancelled]
        created_at:
          type: string
          format: date-time

    AvailableSlotsResponse:
      type: object
      properties:
        coach_id:
          type: string
        date:
          type: string
        timezone:
          type: string
        slots:
          type: array
          items:
            type: string
            format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict (e.g. slot already booked)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: User does not own this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'